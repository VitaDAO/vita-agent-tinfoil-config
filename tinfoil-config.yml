# Tinfoil Container Configuration — vita-agent production
# v0.12.2: GGUF/llama.cpp -> vLLM (bf16). MINIMAL delta from working v0.11.4.
# Keeps cvm 0.7.5 (proven — gemma4 ran vllm-openai here), no networks/tmpfs/env
# (0.7.5 schema), tool-call-parser qwen3_coder (Qwen3.5 family). App + shim + secrets
# UNCHANGED. Deploy with ALL 10 --secret flags.

cvm-version: 0.7.5
cpus: 8
memory: 65536
gpus: 1

# In-enclave model: bf16 safetensors (same distill), UI-wrapped dm-verity mpk,
# served by vLLM over loopback (provider=local). No external inference, no hairpin.
models:
  - name: "qwen3-6-35b-a3b-claude-4-6-opus-reasoning-distilled"
    repo: "hesamation/Qwen3.6-35B-A3B-Claude-4.6-Opus-Reasoning-Distilled@1b93f96111b5f32711f7d48de619e5c671331283"
    mpk:  "0bcc0d07dd37388a5b2d407ef2f0aa94c57f15b99deba88d44a3028aa7e4bef0_71923912704_22865403-c61b-5cdd-82fe-4f40382a692b"

containers:
  - name: vita-agent
    image: "ghcr.io/vitadao/vita-agent:main@sha256:d9b0117c082ab78883ba977658111a88661b2ab6ae512a73d680d7ef420abe3a"
    registry:
      username: DobrinAlexandru
      password_secret: VITA_AGENT_GHCR_TOKEN
    env:
      - VITA_AGENT_PORT: "8787"
      - STORAGE_BACKEND: "supabase"
      - VITA_AGENT_ENABLE_NEED_FILL: "0"
      - STRICT_PROD: "1"
      - AAD_REQUIRED: "0"
      - VITA_ROUTING_MODE: "direct"
      - OPENAI_AGENTS_DISABLE_TRACING: "1"
      - VITA_AGENT_ENCLAVE_URL: "https://vita-agent-prod.vitality-now.containers.tinfoil.dev/"
      - VITA_AGENT_REQUIRE_SEALED_DEK: "1"
      - VITA_AGENT_ACCEPT_LEGACY_DEK_HEADERS: "0"
      - VITA_AGENT_JSON_LOGS: "1"
      - VITA_AGENT_PROVIDER_HEALTH_DIAGNOSTICS: "1"
      - SENTRY_ENVIRONMENT: "production"
      - SENTRY_RELEASE: "vita-agent@926a3ba"
      - VITA_AGENT_VERSION: "vita-agent@926a3ba"
      - SENTRY_TRACES_SAMPLE_RATE: "0.1"
      - SENTRY_PROFILES_SAMPLE_RATE: "0"
      - SUPABASE_JWT_VERIFY_MODE: "jwks"
      - SUPABASE_JWKS_URL: "https://cuvszjeaitakfvccvofl.supabase.co/auth/v1/.well-known/jwks.json"
      - VITA_AGENT_RATE_LIMIT_RPM: "60"
      - VITA_AGENT_MAX_REQUEST_BYTES: "2097152"
      - VITA_AGENT_EMBED_MODEL: "BAAI/bge-base-en-v1.5"
      - VITA_AGENT_PERSONA_REFRESH_EVERY: "10"
      - VITA_AGENT_AUTO_EXTRACT: "1"
      - VITA_AGENT_JOB_AUTORUN: "1"
      - AUBRAI_MODE: "x402"
      - AUBRAI_DEBUG: "0"
      - AUBRAI_FAST: "0"
      - VITA_AGENT_MODEL_PROVIDER: "local"
      - VITA_AGENT_MODEL: "qwen-opus"
      - VITA_AGENT_LOCAL_BASE_URL: "http://localhost:8080/v1"
      - VITA_AGENT_CHAT_THINKING: "1"
      - VITA_AGENT_CHAT_TEMPERATURE: "0.6"
      - VITA_AGENT_CHAT_TOP_P: "0.95"
      - VITA_AGENT_CHAT_TOP_K: "20"
      - VITA_AGENT_CHAT_MIN_P: "0"
      - VITA_AGENT_CHAT_MAX_TOKENS: "2500"
      - REDPILL_E2EE: "1"
      - REDPILL_ATTESTATION_MODE: "phala-cloud-light"
      - REDPILL_ATTESTATION_RETRIES: "6"
      - REDPILL_ATTESTATION_RETRY_BACKOFF_S: "0.5"
      - REDPILL_REQUIRE_ATTESTATION: "1"
      - REDPILL_REQUIRE_GPU_ATTESTATION: "1"
      - REDPILL_PIN_MRTD: "f06dfda6dce1cf904d4e2bab1dc370634cf95cefa2ceb2de2eee127c9382698090d7a4a13e14c536ec6c9c3c8fa87077"
      - REDPILL_PIN_RTMR0: "fb14dc139f33d6fcf474bc8332cac001259fb31cfbcb6b34d4ceeb552a2c4466884a0cbde45ad98a05c5c060c23ad65a"
      - REDPILL_PIN_RTMR1: "a7b523278d4f914ee8df0ec80cd1c3d498cbf1152b0c5eaf65bad9425072874a3fcf891e8b01713d3d9937e3e0d26c15"
      - REDPILL_PIN_RTMR2: "24847f5c5a2360d030bc4f7b8577ce32e87c4d051452c937e91220cab69542daef83433947c492b9c201182fc9769bbe"
    secrets:
      - VITA_AGENT_GHCR_TOKEN
      - TINFOIL_API_KEY
      - REDPILL_API_KEY
      - SENTRY_DSN
      - SUPABASE_URL
      - SUPABASE_ANON_KEY
      - SUPABASE_INTERNAL_AUTH_EMAIL
      - SUPABASE_INTERNAL_AUTH_PASSWORD
      - AUBRAI_HPKE_PUBLIC_KEY
      - X402_WALLET_PRIVATE_KEY

  # In-enclave model server — vLLM (REPLACES the llama.cpp `llama` block).
  # Only cvm-0.7.5-supported fields. Internal-only (127.0.0.1). No secrets here.
  - name: vllm
    image: "vllm/vllm-openai:v0.22.0@sha256:0fec7ec5f3e6bc168e54899935fb0557da908a4832a1dbc88e2debcf2f889416"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    command:
      - "--model"
      - "/tinfoil/mpk/mpk-0bcc0d07dd37388a5b2d407ef2f0aa94c57f15b99deba88d44a3028aa7e4bef0"
      - "--served-model-name"
      - "qwen-opus"
      - "--language-model-only"
      - "--dtype"
      - "bfloat16"
      - "--kv-cache-dtype"
      - "fp8"
      - "--max-model-len"
      - "32768"
      - "--max-num-seqs"
      - "32"
      - "--gpu-memory-utilization"
      - "0.90"
      - "--enable-prefix-caching"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
      - "--reasoning-parser"
      - "qwen3"
      - "--scheduling-policy"
      - "priority"
      - "--host"
      - "127.0.0.1"
      - "--port"
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 60m

shim:
  upstream-port: 8787
  paths:
    - /api/health
    - /metrics
    - /.well-known/enclave-pubkey
    - /api/v1/capsule
    - /api/v1/jobs
    - /api/v1/jobs/*
