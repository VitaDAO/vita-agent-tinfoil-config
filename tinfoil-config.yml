# Tinfoil Container Configuration — vita-agent production
#
# PUBLIC REPO — this file is the attestation anchor.
# Users verify the running enclave against the SHA256 digest pinned below.
#
# DEPLOY:
#   1. Source code lives in VitaDAO/vita-agent
#   2. That repo's CI builds + pushes the image to GHCR
#   3. Copy the new digest below + bump version
#   4. Push a vX.Y.Z tag here → tinfoil-build.yml attests + creates pre-release
#   5. Deploy the tag as a non-debug Tinfoil container named vita-agent-prod

cvm-version: 0.7.5
cpus: 8         # Phase 1+3: 4 uvicorn workers, each forking subprocesses per request
memory: 16384   # 16 GB — initial prod-attested headroom; tune after real capsule/job telemetry

containers:
  - name: vita-agent
    # Image digest is pinned per release.
    # Update by hand whenever a new vita-agent build lands in GHCR.
    image: "ghcr.io/vitadao/vita-agent:474f1996d2b6ed6781d8a3464fe3aacc24c81d5c@sha256:6e14c1da49a8d49a20a83fa702e7d2224b7fdc34d4680f807b59e53afcd486c0"
    registry:
      username: DobrinAlexandru
      # Per-service secret name so vita-agent and aubrai-server can rotate
      # independently even if Tinfoil shares the secret namespace across containers.
      password_secret: VITA_AGENT_GHCR_TOKEN

    env:
      # Production non-debug private-AI runtime. Staging points here first
      # to prove attestation before the app production cutover.
      - VITA_AGENT_PORT: "8787"
      - STORAGE_BACKEND: "supabase"

      # Need/Fill retrieval loop. Capability-gated in the handler: activates
      # ONLY for requests advertising client_capabilities:["need_fill_v1"]
      # (app build with VITE_ENABLE_NEED_FILL), so byte-identical otherwise.
      # Disabled 2026-06-16: advertising need_fill_v1 (frontend bed9666b) made
      # EVERY chat wire request_browser_data+StopAtTools onto the agent, whose
      # need/fill path still 5xxs (llm_upstream_busy / fill-leg). Flip back to
      # "1" only after the enclave run-termination fix lands + frontend re-tests.
      - VITA_AGENT_ENABLE_NEED_FILL: "0"

      # Production hardening gates
      - STRICT_PROD: "1"
      # Keep legacy no-AAD decrypt fallback enabled while staging validates
      # existing encrypted rows. New writes remain AAD-bound in app/agent code;
      # flip to "1" only after the legacy row migration/backfill passes.
      - AAD_REQUIRED: "0"
      - VITA_ROUTING_MODE: "direct"
      - OPENAI_AGENTS_DISABLE_TRACING: "1"
      - VITA_AGENT_ENCLAVE_URL: "https://vita-agent-prod.vitality-now.containers.tinfoil.dev/"
      - VITA_AGENT_REQUIRE_SEALED_DEK: "1"      # Reject plaintext DEK headers
      - VITA_AGENT_ACCEPT_LEGACY_DEK_HEADERS: "0"
      - VITA_AGENT_JSON_LOGS: "1"
      # Off — was a temporary Jun 16 latency probe (v0.10.65).
      - VITA_AGENT_PROVIDER_HEALTH_DIAGNOSTICS: "0"

      # PHI-safe Sentry is disabled unless SENTRY_DSN is configured as a
      # Tinfoil secret. Keep traces/profiles off by default.
      - SENTRY_ENVIRONMENT: "production"
      - SENTRY_RELEASE: "vita-agent@474f199"
      - VITA_AGENT_VERSION: "vita-agent@474f199"
      - SENTRY_TRACES_SAMPLE_RATE: "1.0"
      - SENTRY_PROFILES_SAMPLE_RATE: "0"

      # Supabase JWT verification. User-facing data reads/writes forward the
      # user's Supabase JWT. Control-plane replay/audit/cost rows use a
      # Supabase Auth machine user with app_metadata.vita_agent_internal=true,
      # so no Supabase signing key or service-role key is required.
      - SUPABASE_JWT_VERIFY_MODE: "jwks"
      - SUPABASE_JWKS_URL: "https://cuvszjeaitakfvccvofl.supabase.co/auth/v1/.well-known/jwks.json"
      # Note: no VITA_AGENT_ATTESTATION_MODE — attestation is served by
      # the cvmimage shim at /.well-known/tinfoil-attestation, not by
      # this workload. Removed in vita-agent v0.8.17.

      # Per-user rate limiting (token bucket)
      - VITA_AGENT_RATE_LIMIT_RPM: "60"
      - VITA_AGENT_MAX_REQUEST_BYTES: "2097152"  # 2MB

      # Browser allowlist — origins that can hit /api/*
      - VITA_AGENT_CORS_ORIGINS: "https://app.vitadao.com,https://staging-app.vitadao.com"

      # Memory pipeline (bge-base default; downgrade to bge-small only if streaming
      # latency is a problem. Adaptive chunk size + adaptive K are always on.)
      - VITA_AGENT_EMBED_MODEL: "BAAI/bge-base-en-v1.5"

      # Persona doc auto-refresh cadence (every Nth write_memory)
      - VITA_AGENT_PERSONA_REFRESH_EVERY: "10"

      # Auto fact extraction (Mem0-style) ON by default; set to "0" to disable
      - VITA_AGENT_AUTO_EXTRACT: "1"

      # Encrypted job runner. Production v1 does not run a durable internal
      # autorunner; the browser creates a job and immediately triggers
      # /api/v1/jobs/{id}/run with the user's RLS-scoped Supabase JWT.
      - VITA_AGENT_JOB_AUTORUN: "0"

      # Aubrai routing
      - AUBRAI_MODE: "x402"
      # AUBRAI_DEBUG=0 forces the HPKE encrypted x402 Aubrai endpoint.
      - AUBRAI_DEBUG: "0"
      - AUBRAI_FAST: "0"

      # LLM provider — Tinfoil Inference is the only allowed provider.
      # Available models (2026-04-22): glm-5-1, gpt-oss-120b, kimi-k2-6,
      # llama3-3-70b, gemma4-31b, qwen3-vl-30b, voxtral-small-24b.
      #
      # 2026-04-22: switched glm-5-1 → kimi-k2-6. Local bench showed
      # kimi was 2-4.5x faster than glm-5-1 with much steadier latency.
      #
      # 2026-04-22 (v0.8.8): switched kimi-k2-6 → gemma4-31b. The
      # routing test (scripts/test_aubrai_routing.py, 17 prompts mixing
      # trivial / user-data / explicit-ask / longevity-domain / ambiguous
      # biology) showed kimi-k2-6 unreliably called call_aubrai_scientist
      # for ambiguous biology terms (FOXO3, alpha-ketoglutarate) and even
      # fabricated "Aubrai found..." attributions when it skipped the
      # call. gemma4-31b scored 17/17 with no forced classifier — it
      # follows the system-prompt routing rules naturally. Slightly
      # slower per token (5-30s for tool-using turns vs kimi's 5-22s)
      # but the reliability + honesty gain outweighs the latency.
      #
      # 2026-04-23 (v0.8.14): reverted gemma4-31b → kimi-k2-6. Trading
      # routing reliability for raw speed during the perf push. Watch
      # for the regression: hallucinated "Aubrai found..." attributions
      # and skipped tool calls on ambiguous biology terms. If those
      # come back, rollback to gemma4-31b is one line.
      #
      # 2026-04-23 (v0.8.15): kimi-k2-6 → kimi-k2-5. v0.8.14 pinned the
      # wrong K2 SKU; user explicitly asked for k2-5. Tinfoil exposes
      # both — `curl -H "Authorization: Bearer $TINFOIL_API_KEY"
      # https://inference.tinfoil.sh/v1/models` lists both ids.
      #
      # 2026-04-28: kimi-k2-5 → kimi-k2-6. Tinfoil rotated the k2-5 SKU
      # (no longer in /v1/models); requests return 503 "engine overloaded"
      # which surfaces to the browser as InternalServerError on chat.
      # Verified via scripts/test_tinfoil_models.sh — k2-6 returns 200
      # in 3ms; k2-5 absent from the model list. Other available kimi-class
      # alternatives if k2-6 ever rotates: gemma4-31b, llama3-3-70b,
      # gpt-oss-120b (all returned 200 in the same probe).
      # 2026-06-16: RedPill interim — enclave ConnectTimeout to *.tinfoil.sh
      # (hairpin on control.inf6.tinfoil.sh). api.redpill.ai is reachable.
      # Swap back to the commented tinfoil/gemma block once Tinfoil restores
      # inference/router egress (regression since Jun 15; worked Jun 10–15).
      - VITA_AGENT_MODEL_PROVIDER: "redpill"
      - VITA_AGENT_MODEL: "phala/qwen3.6-35b-a3b"
      - VITA_AGENT_CHAT_TEMPERATURE: "0.2"
      - REDPILL_E2EE: "1"
      - REDPILL_ATTESTATION_MODE: "phala-cloud-light"
      - REDPILL_ATTESTATION_RETRIES: "6"
      - REDPILL_ATTESTATION_RETRY_BACKOFF_S: "0.5"
      - REDPILL_REQUIRE_ATTESTATION: "1"
      - REDPILL_REQUIRE_GPU_ATTESTATION: "1"
      - REDPILL_PIN_MRTD: "f06dfda6dce1cf904d4e2bab1dc370634cf95cefa2ceb2de2eee127c9382698090d7a4a13e14c536ec6c9c3c8fa87077"
      - REDPILL_PIN_RTMR0: "fb14dc139f33d6fcf474bc8332cac001259fb31cfbcb6b34d4ceeb552a2c4466884a0cbde45ad98a05c5c060c23ad65a"
      - REDPILL_PIN_RTMR1: "a7b523278d4f914ee8df0ec80cd1c3d498cbf1152b0c5eaf65bad9425072874a3fcf891e8b01713d3d9937e3e0d26c15"
      - REDPILL_PIN_RTMR2: "24847f5c5a2360d030bc4f7b8577ce32e87c4d051452c937e91220cab69542daef83433947c492b9c201182fc9769bbe"
      # Target (June 10 path) — re-enable when Tinfoil fixes inf6 egress:
      # - VITA_AGENT_MODEL_PROVIDER: "tinfoil"
      # - VITA_AGENT_MODEL: "gemma4-31b"

    secrets:
      # ── All values are encrypted; only decryptable inside the attested enclave ──
      # Set each in the Tinfoil Dashboard > Secrets BEFORE first deploy.

      # GHCR pull credentials — per-service name so vita-agent and aubrai-server
      # can rotate independently even if Tinfoil shares the secret namespace.
      - VITA_AGENT_GHCR_TOKEN

      # Tinfoil Inference (LLM) auth — keep for swap-back to gemma4-31b
      - TINFOIL_API_KEY

      # RedPill/Phala confidential inference (active interim LLM)
      - REDPILL_API_KEY

      # Sentry error monitoring. DSN is a secret in Tinfoil, never committed.
      - SENTRY_DSN

      # Supabase. User JWTs are forwarded for user-scoped data; the machine
      # user token is only for internal replay/audit/cost RLS policies.
      - SUPABASE_URL
      - SUPABASE_ANON_KEY
      - SUPABASE_INTERNAL_AUTH_EMAIL
      - SUPABASE_INTERNAL_AUTH_PASSWORD

      # Aubrai scientist tool — HPKE seal target + x402 wallet
      - AUBRAI_HPKE_PUBLIC_KEY        # 32-byte hex; published by Aubrai
      - X402_WALLET_PRIVATE_KEY       # Base mainnet wallet, funded with USDC.
                                      # HIGHEST-VALUE secret in this enclave.

shim:
  upstream-port: 8787
  paths:
    # Bootstrapping (no auth)
    - /api/health
    - /metrics
    - /.well-known/enclave-pubkey
    # Note: /.well-known/tinfoil-attestation is served by the shim
    # itself (cvmimage), so we don't list it here. The vita-agent
    # workload doesn't publish an attestation route as of v0.8.17.

    # v1 capsule transport (sealed envelope path).
    - /api/v1/capsule
    - /api/v1/jobs
    - /api/v1/jobs/*
