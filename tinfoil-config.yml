# Tinfoil Container Configuration — vita-agent-prod (SLIM, app-only / model split)
# App calls the model over attested HTTPS to vita-model-prod (provider=tinfoil,
# pinned to VitaDAO/vita-agent-model-test-tinfoil-config). No GPU, no vLLM here.

cvm-version: 0.7.5
cpus: 2
memory: 8192

containers:
  - name: vita-agent
    image: "ghcr.io/vitadao/vita-agent:237fc8812cb4b27a28dd6db6aa16cc4739512ab6@sha256:1d97d92b9bea7a03395bf340ab6c2a36d47f4b19b31ab5b99785c21abbdfaadd"
    registry:
      username: DobrinAlexandru
      password_secret: VITA_AGENT_GHCR_TOKEN
    env:
      - VITA_AGENT_PORT: "8787"
      - STORAGE_BACKEND: "supabase"
      # Public, staging-only Supabase endpoint credentials. These are the same
      # values shipped to the browser and carry no service-role authority.
      - SUPABASE_URL: "https://onqhfjiymokeljclyqdu.supabase.co"
      - SUPABASE_ANON_KEY: "sb_publishable_dfOtrN4XrFiQ2j_c2qp-TA_DK6xkOc0"
      - VITA_AGENT_ENABLE_NEED_FILL: "1"
      # Staging-only Context V2 canary. This branch/tag is never used by prod.
      - VITA_TURN_ENVELOPE_V2: "1"
      - VITA_CONTEXT_OWNER_BACKEND: "1"
      - VITA_SESSION_V2: "1"
      - VITA_HEALTH_RESOLVER_V2: "1"
      - VITA_CONTEXT_V2_CANARY_PERCENT: "100"
      - VITA_AUBRAI_GATEWAY_V2: "0"
      - VITA_AUBRAI_DURABLE_BUDGET: "0"
      - VITA_AUBRAI_ENCRYPTED_RESPONSE_REQUIRED: "0"
      - VITA_AUBRAI_ATTESTATION_REQUIRED: "0"
      - STRICT_PROD: "0"
      - AAD_REQUIRED: "0"
      - VITA_ROUTING_MODE: "direct"
      - VITA_AGENT_STREAMING: "1"
      # P3-deploy-flags — audit-feature flags pinned in committed config (not just
      # the ephemeral enclave Variables layer), so a fresh `container create` can
      # never silently disable the safety/recall channels.
      - VITA_AGENT_PINNED_SAFETY: "1"
      - VITA_AGENT_EXACT_MATCH: "1"
      - VITA_AGENT_INPUT_FILTER: "1"
      - VITA_AGENT_TOOLCALL_SALVAGE: "1"
      - VITA_AGENT_GRADED_EFFORT: "1"
      - VITA_AGENT_RESPONSE_SHAPE: "1"
      - VITA_AGENT_PARALLEL_TOOLS: "1"
      - VITA_AGENT_STATIC_PREFIX: "1"
      - OPENAI_AGENTS_DISABLE_TRACING: "1"
      - VITA_AGENT_ENCLAVE_URL: "https://vita-agent-tinfoil.debug.vitality-now.containers.tinfoil.dev/"
      - VITA_AGENT_REQUIRE_SEALED_DEK: "1"
      - VITA_AGENT_ACCEPT_LEGACY_DEK_HEADERS: "0"
      - VITA_AGENT_JSON_LOGS: "1"
      - VITA_AGENT_PROVIDER_HEALTH_DIAGNOSTICS: "1"
      - SENTRY_ENVIRONMENT: "staging"
      - SENTRY_RELEASE: "vita-agent@237fc881-staging-context-v2"
      - VITA_AGENT_VERSION: "vita-agent@237fc881-staging-context-v2"
      - VITA_AGENT_DEPLOYMENT_ID: "staging-vita-agent-237fc881-context-v2"
      - VITA_AGENT_POLICY_VERSION: "vita-agent-policy/2026-07-12"
      - VITA_CONTEXT_V2_COHORT_POLICY_VERSION: "context-v2-rollout/1"
      - SENTRY_TRACES_SAMPLE_RATE: "0.1"
      - SENTRY_PROFILES_SAMPLE_RATE: "0"
      - SUPABASE_JWT_VERIFY_MODE: "jwks"
      - SUPABASE_JWKS_URL: "https://onqhfjiymokeljclyqdu.supabase.co/auth/v1/.well-known/jwks.json"
      - VITA_AGENT_RATE_LIMIT_RPM: "60"
      - VITA_AGENT_MAX_REQUEST_BYTES: "2097152"
      - VITA_AGENT_EMBED_MODEL: "BAAI/bge-base-en-v1.5"
      - VITA_AGENT_PERSONA_REFRESH_EVERY: "10"
      - VITA_AGENT_AUTO_EXTRACT: "1"
      # Async workers need a distinct staging internal identity. Keep them dark
      # until that identity is provisioned; synchronous Context V2 uses user RLS.
      - VITA_AGENT_JOB_AUTORUN: "0"
      - AUBRAI_MODE: "x402"
      - AUBRAI_DEBUG: "0"
      - AUBRAI_FAST: "1"
      - VITA_AGENT_MODEL_PROVIDER: "tinfoil"
      - VITA_AGENT_TINFOIL_TRANSPORT: "sdk"
      - VITA_AGENT_TINFOIL_ENCLAVE: "vita-model-prod.vitality-now.containers.tinfoil.dev"
      - VITA_AGENT_TINFOIL_REPO: "VitaDAO/vita-agent-model-test-tinfoil-config"
      - VITA_AGENT_MODEL: "qwen-opus"
      # Adaptive session replay: normal chat should not prefill 131K tokens.
      # 131K remains available only for explicit full-history/full-audit asks.
      - VITA_AGENT_HISTORY_TOKEN_BUDGET_STRATEGY: "adaptive"
      - VITA_AGENT_HISTORY_TOKEN_BUDGET: "22000"
      - VITA_AGENT_HISTORY_TOKEN_BUDGET_FAST: "8000"
      - VITA_AGENT_HISTORY_TOKEN_BUDGET_NORMAL: "22000"
      - VITA_AGENT_HISTORY_TOKEN_BUDGET_COMPLEX: "32768"
      - VITA_AGENT_HISTORY_TOKEN_BUDGET_DEEP: "65536"
      - VITA_AGENT_HISTORY_TOKEN_BUDGET_FULL: "131072"
      - VITA_AGENT_CHAT_THINKING: "auto"
      - VITA_AGENT_CHAT_TEMPERATURE: "0.6"
      - VITA_AGENT_CHAT_TOP_P: "0.95"
      - VITA_AGENT_CHAT_TOP_K: "20"
      - VITA_AGENT_CHAT_MIN_P: "0"
      - VITA_AGENT_CHAT_MAX_TOKENS: "6000"
      - VITA_AGENT_CHAT_MAX_TOKENS_LIGHT: "800"
      - VITA_AGENT_CHAT_MAX_TOKENS_LOW: "1200"
      - VITA_AGENT_CHAT_THINK_BUDGET_LOW: "300"
      - VITA_AGENT_MAX_TOOL_CALLS: "10"
      - REDPILL_E2EE: "1"
      - REDPILL_ATTESTATION_MODE: "phala-cloud-light"
      - REDPILL_ATTESTATION_RETRIES: "6"
      - REDPILL_ATTESTATION_RETRY_BACKOFF_S: "0.5"
      - REDPILL_REQUIRE_ATTESTATION: "1"
      - REDPILL_REQUIRE_GPU_ATTESTATION: "1"
      - REDPILL_PIN_MRTD: "f06dfda6dce1cf904d4e2bab1dc370634cf95cefa2ceb2de2eee127c9382698090d7a4a13e14c536ec6c9c3c8fa87077"
      - REDPILL_PIN_RTMR0: "fb14dc139f33d6fcf474bc8332cac001259fb31cfbcb6b34d4ceeb552a2c4466884a0cbde45ad98a05c5c060c23ad65a"
      - REDPILL_PIN_RTMR1: "a7b523278d4f914ee8df0ec80cd1c3d498cbf1152b0c5eaf65bad9425072874a3fcf891e8b01713d3d9937e3e0d26c15"
      - REDPILL_PIN_RTMR2: "24847f5c5a2360d030bc4f7b8577ce32e87c4d051452c937e91220cab69542daef83433947c492b9c201182fc9769bbe"
    secrets:
      - VITA_AGENT_GHCR_TOKEN
      - TINFOIL_API_KEY
      - REDPILL_API_KEY
      - SENTRY_DSN
      # SUPABASE_URL and SUPABASE_ANON_KEY are public staging values supplied as
      # per-container variables. Never mount the production Supabase identity.
      - AUBRAI_HPKE_PUBLIC_KEY
      # Never mount the production x402 wallet into staging.
      - VITA_PROTOCOL_TICKET_HMAC_KEY

shim:
  upstream-port: 8787
  paths:
    - /api/health
    - /metrics
    - /.well-known/enclave-pubkey
    - /.well-known/vita-agent-capabilities
    - /api/v1/turn-protocol-ticket
    - /api/v1/capsule
    - /api/v1/capsule/stream
    - /api/v1/jobs
    - /api/v1/jobs/*
