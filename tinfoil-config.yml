# Tinfoil Container Configuration — staging-vita-agent (staging debug enclave)
# Staging debug container for testing vita-agent changes before production.
# CI auto-updates the image field on every push to vita-agent staging branch.

cvm-version: 0.7.5
cpus: 4
memory: 16384

containers:
  - name: vita-agent
    image: "ghcr.io/vitadao/vita-agent:staging-52f6e637909ffabe9cfc2b754683148a33af1cad@sha256:9a3babb51d92f573a11c897e2bc7af3754fecadb71b738106d302a1fe2577324"
    registry:
      username: DobrinAlexandru
      password_secret: VITA_AGENT_GHCR_TOKEN
    env:
      - VITA_AGENT_PORT: "8787"
      - STORAGE_BACKEND: "supabase"
      - VITA_AGENT_ENABLE_NEED_FILL: "1"
      - STRICT_PROD: "0"
      - AAD_REQUIRED: "0"
      - VITA_ROUTING_MODE: "direct"
      - VITA_AGENT_STREAMING: "1"
      - VITA_AGENT_PINNED_SAFETY: "1"
      - VITA_AGENT_EXACT_MATCH: "1"
      - VITA_AGENT_INPUT_FILTER: "1"
      - VITA_AGENT_TOOLCALL_SALVAGE: "1"
      - OPENAI_AGENTS_DISABLE_TRACING: "1"
      - VITA_AGENT_ENCLAVE_URL: "https://staging-vita-agent.debug.vitality-now.containers.tinfoil.dev/"
      - VITA_AGENT_REQUIRE_SEALED_DEK: "1"
      - VITA_AGENT_ACCEPT_LEGACY_DEK_HEADERS: "0"
      - VITA_AGENT_JSON_LOGS: "1"
      - VITA_AGENT_PROVIDER_HEALTH_DIAGNOSTICS: "1"
      - SENTRY_ENVIRONMENT: "staging"
      - SENTRY_RELEASE: "vita-agent@52f6e63"
      - VITA_AGENT_VERSION: "vita-agent@52f6e63"
      - SENTRY_TRACES_SAMPLE_RATE: "0.1"
      - SENTRY_PROFILES_SAMPLE_RATE: "0"
      - SUPABASE_JWT_VERIFY_MODE: "jwks"
      - SUPABASE_JWKS_URL: "https://cuvszjeaitakfvccvofl.supabase.co/auth/v1/.well-known/jwks.json"
      - VITA_AGENT_RATE_LIMIT_RPM: "60"
      - VITA_AGENT_MAX_REQUEST_BYTES: "2097152"
      - VITA_AGENT_EMBED_MODEL: "BAAI/bge-base-en-v1.5"
      - VITA_AGENT_PERSONA_REFRESH_EVERY: "10"
      - VITA_AGENT_AUTO_EXTRACT: "1"
      - VITA_AGENT_JOB_AUTORUN: "1"
      - AUBRAI_MODE: "x402"
      - AUBRAI_DEBUG: "1"
      - AUBRAI_FAST: "0"
      - VITA_AGENT_MODEL_PROVIDER: "tinfoil"
      - VITA_AGENT_TINFOIL_TRANSPORT: "sdk"
      - VITA_AGENT_TINFOIL_ENCLAVE: "vita-model-prod.vitality-now.containers.tinfoil.dev"
      - VITA_AGENT_TINFOIL_REPO: "VitaDAO/vita-agent-model-test-tinfoil-config"
      - VITA_AGENT_MODEL: "qwen-opus"
      - VITA_AGENT_HISTORY_TOKEN_BUDGET: "131072"
      - VITA_AGENT_CHAT_THINKING: "1"
      - VITA_AGENT_CHAT_TEMPERATURE: "0.6"
      - VITA_AGENT_CHAT_TOP_P: "0.95"
      - VITA_AGENT_CHAT_TOP_K: "20"
      - VITA_AGENT_CHAT_MIN_P: "0"
      - VITA_AGENT_CHAT_MAX_TOKENS: "4500"
      - REDPILL_E2EE: "1"
      - REDPILL_ATTESTATION_MODE: "phala-cloud-light"
      - REDPILL_ATTESTATION_RETRIES: "6"
      - REDPILL_ATTESTATION_RETRY_BACKOFF_S: "0.5"
      - REDPILL_REQUIRE_ATTESTATION: "0"
      - REDPILL_REQUIRE_GPU_ATTESTATION: "0"
    secrets:
      - VITA_AGENT_GHCR_TOKEN
      - TINFOIL_API_KEY
      - REDPILL_API_KEY
      - SENTRY_DSN
      - SUPABASE_URL
      - SUPABASE_ANON_KEY
      - SUPABASE_INTERNAL_AUTH_EMAIL
      - SUPABASE_INTERNAL_AUTH_PASSWORD
      - AUBRAI_HPKE_PUBLIC_KEY
      - X402_WALLET_PRIVATE_KEY

shim:
  upstream-port: 8787
  paths:
    - /api/health
    - /metrics
    - /.well-known/enclave-pubkey
    - /api/v1/capsule
    - /api/v1/capsule/stream
    - /api/v1/jobs
    - /api/v1/jobs/*
