# Tinfoil Container Configuration — staging-vita-agent (staging debug enclave)
# Staging debug container for testing vita-agent changes before production.
# CI auto-updates the image field on every push to vita-agent staging branch.

cvm-version: 0.7.5
cpus: 4
memory: 16384

containers:
  - name: vita-agent
    image: "ghcr.io/vitadao/vita-agent:staging-ec2de2e78c9d090e6870d75728bf674b2b1ed873@sha256:40bdab927f5c55090ac0461639e64c8d8766e54c6444a14b33dc0ad6dc88412f"
    registry:
      username: DobrinAlexandru
      password_secret: VITA_AGENT_GHCR_TOKEN
    env:
      - VITA_AGENT_PORT: "8787"
      - STORAGE_BACKEND: "supabase"
      - SUPABASE_URL: "https://onqhfjiymokeljclyqdu.supabase.co"
      - SUPABASE_ANON_KEY: "sb_publishable_dfOtrN4XrFiQ2j_c2qp-TA_DK6xkOc0"
      # Non-secret identity; password is supplied ONLY via encrypted container
      # variable (empty config values override variables and break login).
      # Do not attach shared prod SUPABASE_INTERNAL_AUTH_* org secrets.
      - SUPABASE_INTERNAL_AUTH_EMAIL: "vita-agent-staging-internal@vitadao.com"
      - VITA_AGENT_ENABLE_NEED_FILL: "1"
      - STRICT_PROD: "0"
      - AAD_REQUIRED: "0"
      - VITA_ROUTING_MODE: "direct"
      - VITA_AGENT_STREAMING: "0"
      # Turn-V2 capability identity + context-v2 bundle (mirror prod). Without these
      # build_capability_document() raises capability_identity_unavailable → the
      # /.well-known/vita-agent-capabilities endpoint 503s → the V2 client cannot
      # negotiate a turn → every chat fails with chat_agent_error. The 4 context-v2
      # flags are all-or-nothing (partial set → partial_context_v2_bundle).
      - VITA_AGENT_DEPLOYMENT_ID: "staging-vita-agent-ec2de2e"
      - VITA_AGENT_POLICY_VERSION: "vita-agent-policy/2026-07-12"
      - VITA_CONTEXT_V2_COHORT_POLICY_VERSION: "context-v2-rollout/1"
      - VITA_TURN_ENVELOPE_V2: "1"
      - VITA_CONTEXT_OWNER_BACKEND: "1"
      - VITA_SESSION_V2: "1"
      - VITA_HEALTH_RESOLVER_V2: "1"
      # Without this the caps doc advertises turn_envelope_v2 but
      # context_v2_enabled_for_user() gates it to 0% of users (default). Prod=100.
      - VITA_CONTEXT_V2_CANARY_PERCENT: "100"
      - VITA_AGENT_PINNED_SAFETY: "1"
      - VITA_AGENT_EXACT_MATCH: "1"
      - VITA_AGENT_INPUT_FILTER: "1"
      - VITA_AGENT_TOOLCALL_SALVAGE: "1"
      - OPENAI_AGENTS_DISABLE_TRACING: "1"
      - VITA_AGENT_ENCLAVE_URL: "https://staging-vita-agent.debug.vitality-now.containers.tinfoil.dev/"
      - VITA_AGENT_REQUIRE_SEALED_DEK: "1"
      - VITA_AGENT_ACCEPT_LEGACY_DEK_HEADERS: "0"
      - VITA_AGENT_JSON_LOGS: "1"
      - VITA_AGENT_PROVIDER_HEALTH_DIAGNOSTICS: "1"
      - SENTRY_ENVIRONMENT: "staging"
      - SENTRY_RELEASE: "vita-agent@ec2de2e"
      - VITA_AGENT_VERSION: "vita-agent@ec2de2e"
      - SENTRY_TRACES_SAMPLE_RATE: "0.1"
      - SENTRY_PROFILES_SAMPLE_RATE: "0"
      - SUPABASE_JWT_VERIFY_MODE: "jwks"
      - SUPABASE_JWKS_URL: "https://onqhfjiymokeljclyqdu.supabase.co/auth/v1/.well-known/jwks.json"
      - VITA_AGENT_RATE_LIMIT_RPM: "60"
      - VITA_AGENT_MAX_REQUEST_BYTES: "2097152"
      - VITA_AGENT_EMBED_MODEL: "BAAI/bge-base-en-v1.5"
      - VITA_AGENT_PERSONA_REFRESH_EVERY: "10"
      - VITA_AGENT_AUTO_EXTRACT: "1"
      - VITA_AGENT_JOB_AUTORUN: "1"
      - AUBRAI_MODE: "x402"
      - AUBRAI_DEBUG: "1"
      - AUBRAI_FAST: "0"
      - VITA_AGENT_MODEL_PROVIDER: "tinfoil"
      - VITA_AGENT_TINFOIL_TRANSPORT: "sdk"
      - VITA_AGENT_TINFOIL_ENCLAVE: "vita-model-prod.vitality-now.containers.tinfoil.dev"
      - VITA_AGENT_TINFOIL_REPO: "VitaDAO/vita-agent-model-test-tinfoil-config"
      - VITA_AGENT_MODEL: "qwen-opus"
      - VITA_AGENT_HISTORY_TOKEN_BUDGET: "131072"
      - VITA_AGENT_CHAT_THINKING: "1"
      - VITA_AGENT_CHAT_TEMPERATURE: "0.6"
      - VITA_AGENT_CHAT_TOP_P: "0.95"
      - VITA_AGENT_CHAT_TOP_K: "20"
      - VITA_AGENT_CHAT_MIN_P: "0"
      - VITA_AGENT_CHAT_MAX_TOKENS: "4500"
      - REDPILL_E2EE: "1"
      - REDPILL_ATTESTATION_MODE: "phala-cloud-light"
      - REDPILL_ATTESTATION_RETRIES: "6"
      - REDPILL_ATTESTATION_RETRY_BACKOFF_S: "0.5"
      - REDPILL_REQUIRE_ATTESTATION: "0"
      - REDPILL_REQUIRE_GPU_ATTESTATION: "0"
    secrets:
      - VITA_AGENT_GHCR_TOKEN
      - TINFOIL_API_KEY
      - REDPILL_API_KEY
      - SENTRY_DSN
      # Staging Supabase URL/anon/internal identity live in env/variables above
      # (onqhf…). Do NOT attach shared org SUPABASE_* secrets — those are prod
      # (cuvsz…) and override the staging values (jobs PGRST301 / JWT mismatch).
      - AUBRAI_HPKE_PUBLIC_KEY
      - X402_WALLET_PRIVATE_KEY
      # Backs /api/v1/turn-protocol-ticket (exposed in shim.paths). Already ATTACHED
      # to the enclave; declared here so a create --replace can't silently drop it.
      - VITA_PROTOCOL_TICKET_HMAC_KEY

shim:
  upstream-port: 8787
  paths:
    - /api/health
    - /metrics
    - /.well-known/enclave-pubkey
    - /.well-known/vita-agent-capabilities
    - /api/v1/turn-protocol-ticket
    - /api/v1/capsule
    - /api/v1/capsule/stream
    - /api/v1/jobs
    - /api/v1/jobs/*
