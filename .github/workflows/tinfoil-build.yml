name: Build & Attest Tinfoil Image

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - uses: tinfoilsh/pri-build-action@5d450a7f30904866efc401e24484b935b7ed52dd  # v0.6.1
        with:
          config-file: ${{ github.workspace }}/tinfoil-config.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # MUST be "false" — atc.tinfoil.sh fetches the deployment manifest via
          # GitHub's /releases/latest endpoint, which skips prereleases. A
          # prerelease-only repo causes atc to return HTTP 500 "Failed to build
          # attestation bundle" and the browser SecureClient init throws.
          prerelease: "false"
