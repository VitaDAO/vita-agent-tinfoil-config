name: Build & Attest Tinfoil Image

on:
  push:
    tags:
      - 'v*.*.*'
      - 'staging-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - uses: tinfoilsh/measure-image-action@02f24fd03e2e79abc9a2044b1c8f380ae5bec9e3  # v0.10.0 — reads bundle_url via `gh attestation verify` (GitHub's 2026-07 API removed the inline attestation bundle, which broke v0.6.1's `Bundle.from_json(None)`). measure_amd.py is byte-identical v0.6.1→v0.10.0, so the SNP measurement math is unchanged; still GATE on measurement equality vs the deployed version before relaunch (v0.10.0 adds a vm_shape predicate field).
        with:
          config-file: ${{ github.workspace }}/tinfoil-config.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # v0.10.0 dropped the `prerelease` input; it now runs `gh release create
          # --latest=false` by default (mark-as-latest defaults to "false"), which
          # preserves the "do NOT auto-flip /releases/latest" safety so atc keeps
          # serving the current bundle until an explicit post-deploy promotion.
