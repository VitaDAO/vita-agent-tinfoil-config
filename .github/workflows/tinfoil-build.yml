name: Build & Attest Tinfoil Image

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - uses: tinfoilsh/measure-image-action@02f24fd03e2e79abc9a2044b1c8f380ae5bec9e3  # v0.10.0 — reads bundle_url via `gh attestation verify` (GitHub's 2026-07 API dropped the inline attestation bundle, breaking v0.6.1's Bundle.from_json(None)). Verified measurement-safe for cvm 0.7.5: the base kernel/initrd/root/raw hashes are byte-identical to v0.6.1 builds (only cmdline/config differ per release, as always).
        with:
          config-file: ${{ github.workspace }}/tinfoil-config.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # v0.10.0 dropped the `prerelease` input; it runs `gh release create
          # --latest=false` by default (mark-as-latest defaults to "false"), which
          # preserves the "do NOT auto-flip /releases/latest" safety — atc keeps
          # serving the current bundle until an explicit post-deploy promotion.
